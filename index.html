<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASKAI V3.0 | Twin Chat</title>
    <style>
        body {
            background-color: #121212;
            color: #efefef;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-window {
            width: 450px;
            height: 80vh;
            background: #1e1e1e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        header {
            padding: 20px;
            background: #252525;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        header h2 { margin: 0; font-size: 1.2rem; color: #00ffcc; }
        header p { margin: 5px 0 0; font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; }

        #messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Twin on the Left */
        .twin {
            align-self: flex-start;
            background: #333;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        /* You on the Right */
        .user {
            align-self: flex-end;
            background: #00ffcc;
            color: #000;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .typing {
            font-size: 0.8rem;
            margin-left: 20px;
            margin-bottom: 10px;
            color: #00ffcc;
            display: none;
        }

        .input-area {
            padding: 20px;
            background: #252525;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: #121212;
            border: none;
            padding: 12px 15px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        button {
            background: none;
            border: none;
            color: #00ffcc;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="chat-window">
    <header>
        <h2>ASKAI V3.0</h2>
        <p>• Online & Synced</p>
    </header>
    
    <div id="messages">
        <div class="msg twin">Yo. V3.0 is live. I'm literally you, but I don't need to sleep. What's the vibe today?</div>
    </div>

    <div id="status" class="typing">Twin is thinking...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Say something..." autofocus>
        <button id="sendBtn">SEND</button>
    </div>
</div>

<script>
    const box = document.getElementById('messages');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        // User Message (Right)
        const uMsg = document.createElement('div');
        uMsg.className = 'msg user';
        uMsg.innerText = text;
        box.appendChild(uMsg);
        input.value = '';
        box.scrollTop = box.scrollHeight;

        // Twin Response (Left)
        status.style.display = 'block';
        
        setTimeout(() => {
            status.style.display = 'none';
            const responses = [
                "I knew you were gonna say that. Great minds.",
                "Wait, actually? That's wild. Let's roll with it.",
                "I'm already on it. We're gonna crush this.",
                "Classic. You handle the coffee, I'll handle the logic.",
                "I've got a better idea—but let's do yours first. Just to be safe.",
                "Synchronized. I'm feeling that same energy."
            ];
            const tMsg = document.createElement('div');
            tMsg.className = 'msg twin';
            tMsg.innerText = responses[Math.floor(Math.random() * responses.length)];
            box.appendChild(tMsg);
            box.scrollTop = box.scrollHeight;
        }, 1000);
    }

    btn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
