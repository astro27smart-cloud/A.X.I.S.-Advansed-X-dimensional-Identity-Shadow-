<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASKAI V3.0 | Neural Link</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --cyan: #00d4ff;
            --magenta: #ff00ff;
            --glass: rgba(10, 10, 15, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        #starfield { position: fixed; top: 0; left: 0; z-index: -1; }

        #app-container {
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #terminal {
            width: 700px; height: 80vh;
            background: var(--glass);
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            backdrop-filter: blur(15px);
        }

        header {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 212, 255, 0.03);
        }

        .identity { color: var(--cyan); letter-spacing: 2px; font-weight: 800; font-size: 0.9rem; }
        .status { font-size: 0.7rem; color: #444; text-transform: uppercase; }

        #feed {
            flex-grow: 1; padding: 30px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .bubble {
            max-width: 80%; padding: 14px 20px; font-size: 0.95rem; line-height: 1.6;
            border-radius: 4px; position: relative;
        }

        /* User: Right / Magenta Accent */
        .user-msg {
            align-self: flex-end;
            background: rgba(255, 0, 255, 0.05);
            border-right: 2px solid var(--magenta);
            color: #fff;
            text-align: left;
        }

        /* Twin: Left / Cyan Accent */
        .twin-msg {
            align-self: flex-start;
            background: rgba(0, 212, 255, 0.05);
            border-left: 2px solid var(--cyan);
            color: #ccc;
        }

        .input-box {
            padding: 25px; border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; gap: 15px;
        }

        input {
            flex-grow: 1; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px; color: #fff; outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--cyan); background: rgba(0, 212, 255, 0.05); }

        button {
            background: transparent; color: var(--cyan);
            border: 1px solid var(--cyan); padding: 0 25px;
            cursor: pointer; font-size: 0.8rem; font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: var(--cyan); color: #000; }

        #feed::-webkit-scrollbar { width: 3px; }
        #feed::-webkit-scrollbar-thumb { background: var(--cyan); }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app-container">
    <div id="terminal">
        <header>
            <div class="identity">ASKAI V3.0</div>
            <div id="link-status" class="status">Standby // Awaiting Input</div>
        </header>

        <div id="feed">
            </div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="Establish connection..." autocomplete="off">
            <button onclick="sync()">SYNC</button>
        </div>
    </div>
</div>

<script>
    // --- Starfield ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, v:Math.random()*0.5});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            s.y += s.v; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(draw);
    }
