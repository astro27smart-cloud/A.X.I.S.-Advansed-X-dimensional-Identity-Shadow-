<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASKAI V3.0 | Neural Mirror</title>
    <style>
        :root {
            --twin-blue: #00d4ff;
            --user-pink: #ff007a;
            --bg-dark: #0a0b10;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(180deg, #0a0b10 0%, #11141d 100%);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            letter-spacing: 4px;
            font-weight: bold;
            color: var(--twin-blue);
            text-shadow: 0 0 10px var(--twin-blue);
        }

        #message-board {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Message Bubbles */
        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.5;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .twin-msg {
            align-self: flex-start;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--twin-blue);
            border-bottom-left-radius: 2px;
            color: #ccf5ff;
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(255, 0, 122, 0.1);
            border: 1px solid var(--user-pink);
            border-bottom-right-radius: 2px;
            color: #ffe0ed;
        }

        /* Input Area */
        .input-area {
            padding: 25px;
            background: rgba(0,0,0,0.5);
            display: flex;
            gap: 15px;
        }

        input {
            flex-grow: 1;
            background: #1a1d26;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--twin-blue); }

        button {
            background: var(--twin-blue);
            color: black;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--twin-blue);
        }

        .typing {
            font-size: 0.8rem;
            color: var(--twin-blue);
            margin-bottom: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>ASKAI V3.0 // NEURAL LINK</header>
    
    <div id="message-board">
        <div class="bubble twin-msg">
            [V3.0 INITIALIZED]: Systems synchronized. I'm on the left, you're on the right. Our thoughts are officially separated but linked. Ready when you are.
        </div>
    </div>

    <div id="typing-indicator" class="typing" style="padding-left: 30px;">ASKAI V3.0 is processing...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Send a thought to your twin..." autofocus>
        <button id="sendBtn">SYNC</button>
    </div>
</div>

<script>

    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing-indicator');

        const bubble = document.createElement('div');
        bubble.className = `bubble ${isUser ? 'user-msg' : 'twin-msg'}`;
        bubble.innerText = text;
        board.appendChild(bubble);
        board.scrollTop = board.scrollHeight;
    }
