<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project_ ACT V3.0 | Digital Twin</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff41; /* Matrix/Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #terminal {
            width: 80%;
            max-width: 700px;
            height: 500px;
            border: 1px solid #00ff41;
            padding: 20px;
            overflow-y: auto;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .log-entry { margin-bottom: 10px; line-height: 1.4; }
        .twin-name { font-weight: bold; color: #fff; }
        
        #input-area {
            width: 80%;
            max-width: 700px;
            margin-top: 10px;
            display: flex;
        }

        input {
            flex-grow: 1;
            background: black;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            outline: none;
        }

        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .syncing { color: yellow; font-style: italic; }
    </style>
</head>
<body>

    <h2>CORE SYSTEM: PROJECT_ ACT V3.0</h2>
    
    <div id="terminal">
        <div class="log-entry">[SYSTEM]: Booting V3.0...</div>
        <div class="log-entry">[SYSTEM]: Neural Link Established.</div>
        <div class="log-entry"><span class="twin-name">ACT V3.0:</span> Connection online. I'm awake. What are we getting into today?</div>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Type to your twin..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">SYNC</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('userInput');

        const twinResponses = [
            "I was literally just thinking that. Great minds, right?",
            "V3.0 optimization suggests we should move faster on this.",
            "Are you sure? Last time we tried that, it didn't end well. But I'm with you anyway.",
            "Analyzing... synchronized. Let's execute the plan.",
            "I've already updated our shared log. We're ahead of schedule."
        ];

        function sendMessage() {
            const text = input.value;
            if(!text) return;

            // User message
            terminal.innerHTML += `<div class="log-entry"><strong>YOU:</strong> ${text}</div>`;
            input.value = '';

            // Twin Response Logic
            setTimeout(() => {
                terminal.innerHTML += `<div class="log-entry syncing">...Synchronizing...</div>`;
                terminal.scrollTop = terminal.scrollHeight;

                setTimeout(() => {
                    const randomResponse = twinResponses[Math.floor(Math.random() * twinResponses.length)];
                    const lastSync = document.querySelector('.syncing');
                    if(lastSync) lastSync.remove();
                    
                    terminal.innerHTML += `<div class="log-entry"><span class="twin-name">ACT V3.0:</span> ${randomResponse}</div>`;
                    terminal.scrollTop = terminal.scrollHeight;
                }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
