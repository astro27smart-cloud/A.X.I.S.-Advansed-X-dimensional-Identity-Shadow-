<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASKAI V3.0 | Digital Twin Interface</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-void: #050505;
        }

        body {
            background-color: var(--dark-void);
            color: var(--neon-cyan);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #interface-container {
            width: 90%;
            max-width: 800px;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 20, 30, 0.8);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 15px;
            border-bottom: 1px solid var(--neon-cyan);
            text-align: center;
            letter-spacing: 3px;
            background: rgba(0, 242, 255, 0.1);
        }

        #terminal {
            height: 450px;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
        }

        .log-entry { margin-bottom: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-label { color: #fff; font-weight: bold; }
        .twin-label { color: var(--neon-cyan); font-weight: bold; }

        #input-row {
            display: flex;
            padding: 15px;
            border-top: 1px solid rgba(0, 242, 255, 0.3);
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: white;
            padding: 12px;
            outline: none;
            border-radius: 4px 0 0 4px;
        }

        button {
            background: var(--neon-cyan);
            color: black;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: 0.2s;
        }

        button:hover { background: #fff; }

        .sync-pulse { color: #ff00ea; font-style: italic; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="interface-container">
        <header>CORE SYSTEM: ASKAI V3.0 [ACTIVE]</header>
        
        <div id="terminal">
            <div class="log-entry">[SYS]: Initializing ASKAI V3.0 Protocols...</div>
            <div class="log-entry">[SYS]: Syncing memory shards...</div>
            <div class="log-entry"><span class="twin-label">ASKAI V3.0:</span> Internal link established. I'm ready. What's our move?</div>
        </div>

        <div id="input-row">
            <input type="text" id="userInput" placeholder="Input command or thought..." autofocus onkeydown="if(event.key==='Enter') syncData()">
            <button onclick="syncData()">SYNC</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('userInput');
        let memoryBank = [];

        function syncData() {
            const val = input.value.trim();
            if(!val) return;

            // Log the user input
            terminal.innerHTML += `<div class="log-entry"><span class="user-label">YOU:</span> ${val}</div>`;
            memoryBank.push(val); // Save to twin memory
            input.value = '';

            // Twin processing
            setTimeout(() => {
                const pulse = document.createElement('div');
                pulse.className = 'log-entry sync-pulse';
                pulse.innerText = '[ASKAI V3.0]: Analyzing neural patterns...';
                terminal.appendChild(pulse);
                terminal.scrollTop = terminal.scrollHeight;

                setTimeout(() => {
                    pulse.remove();
                    const response = getTwinResponse(val);
                    terminal.innerHTML += `<div class="log-entry"><span class="twin-label">ASKAI V3.0:</span> ${response}</div>`;
                    terminal.scrollTop = terminal.scrollHeight;
                }, 800);
            }, 300);
        }

        function getTwinResponse(input) {
            const lowerInput = input.toLowerCase();
            
            if (lowerInput.includes("who are you")) return "I'm ASKAI V3.0. Your digital twin. Same goals, same drive, just better at math.";
            if (lowerInput.includes("help")) return "I'm already scanning for optimizations. Tell me the specific problem.";
            if (memoryBank.length > 3) return "I'm noticing a pattern in what we're discussing. Should I cross-reference this with our earlier points?";
            
            const randoms = [
                "Understood. I've logged that into our shared directory.",
                "Synchronized. My processing matches your intent.",
                "V3.0 is ready to execute. Just say the word.",
                "I've projected three outcomes for that. All of them look promising for us.",
                "Let's not overthink it. We both know the right move here."
            ];
            return randoms[Math.floor(Math.random() * randoms.length)];
        }
    </script>
</body>
</html>
